<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ficha de equipo — Grupo Tandem Gastronómico</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap');
  :root { --negro:#1a1a1a; --crema:#f7f4ef; --dorado:#c4a35a; --texto:#2d2d2d; --gris:#888; --borde:#ddd8ce; --p1:#C0392B; --p2:#E67E22; --p3:#D4AC0D; --p4:#27AE60; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--crema); color:var(--texto); min-height:100vh; }

  .header { background:var(--negro); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
  .header-marca { font-family:'Cormorant Garamond',serif; color:#fff; font-size:16px; }
  .header-sub { font-size:9px; color:var(--gris); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }

  .contenedor { max-width:600px; margin:0 auto; padding:24px 16px 60px; }

  /* FICHA */
  .ficha { background:#fff; border-radius:8px; border:1px solid var(--borde); overflow:hidden; margin-bottom:20px; }
  .ficha-header { background:var(--negro); padding:20px; }
  .ficha-id { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gris); margin-bottom:4px; }
  .ficha-nombre { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:400; color:#fff; margin-bottom:4px; }
  .ficha-local { font-size:12px; color:#aaa; }
  .ficha-body { padding:20px; }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .info-item label { font-size:9px; text-transform:uppercase; letter-spacing:.8px; color:#bbb; display:block; margin-bottom:3px; }
  .info-item span { font-size:13px; color:var(--texto); }
  .garantia-banner { padding:10px 14px; border-radius:4px; font-size:12px; font-weight:500; margin-bottom:16px; }
  .garantia-ok  { background:#f0faf4; color:var(--p4); border:1px solid #a8e6be; }
  .garantia-exp { background:#fdf1f0; color:var(--p1); border:1px solid #f5b8b3; }
  .garantia-na  { background:#f5f5f5; color:var(--gris); border:1px solid #e0e0e0; }

  /* HISTORIAL */
  .seccion-titulo { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--gris); margin-bottom:10px; font-weight:500; }
  .historial-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #f5f3ef; }
  .historial-item:last-child { border-bottom:none; }
  .h-prio { font-size:10px; font-weight:600; padding:2px 7px; border-radius:3px; flex-shrink:0; }
  .h-desc { font-size:12px; flex:1; }
  .h-fecha { font-size:10px; color:var(--gris); flex-shrink:0; }
  .h-estado { font-size:10px; color:var(--gris); }
  .historial-vacio { font-size:12px; color:var(--gris); font-style:italic; padding:8px 0; }

  /* FORMULARIO */
  .form-card { background:#fff; border-radius:8px; border:1px solid var(--borde); overflow:hidden; }
  .form-header { background:var(--negro); padding:16px 20px; }
  .form-titulo { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:400; color:#fff; }
  .form-sub { font-size:11px; color:#aaa; margin-top:2px; }
  .form-body { padding:20px; }

  .campo { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
  .campo label { font-size:11px; font-weight:500; color:var(--texto); }
  .campo label .req { color:var(--p1); }
  .campo input, .campo select, .campo textarea {
    font-family:'DM Sans',sans-serif; font-size:13px; border:1px solid var(--borde);
    background:#fff; padding:9px 12px; border-radius:4px; color:var(--texto);
    transition:border-color .2s; outline:none; width:100%;
  }
  .campo input:focus, .campo select:focus, .campo textarea:focus { border-color:var(--negro); }
  .campo textarea { resize:vertical; min-height:80px; }

  /* PRIORIDADES */
  .prios { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .prio-card { border:1.5px solid var(--borde); border-radius:6px; padding:10px 12px; cursor:pointer; background:#fff; position:relative; user-select:none; }
  .prio-card input { position:absolute; opacity:0; width:0; height:0; }
  .prio-card:hover { border-color:var(--negro); }
  .prio-card.sel { background:var(--negro); border-color:var(--negro); }
  .pc { font-size:12px; font-weight:700; margin-bottom:2px; }
  .pn { font-size:11px; font-weight:500; margin-bottom:2px; }
  .pd { font-size:10px; opacity:.7; line-height:1.3; }
  .prio-card[data-p="P1"] { --pcc:#C0392B; } .prio-card[data-p="P2"] { --pcc:#E67E22; }
  .prio-card[data-p="P3"] { --pcc:#D4AC0D; } .prio-card[data-p="P4"] { --pcc:#27AE60; }
  .prio-card:not(.sel) .pc { color:var(--pcc); }
  .prio-card:not(.sel) .pn { color:var(--texto); }
  .prio-card:not(.sel) .pd { color:var(--gris); }
  .prio-card.sel .pc, .prio-card.sel .pn, .prio-card.sel .pd { color:#fff; }
  .prio-card.sel .pc { color:var(--pcc); filter:brightness(1.5); }

  .radio-grupo { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .radio-pill { display:flex; align-items:center; gap:5px; border:1px solid var(--borde); padding:6px 12px; border-radius:20px; cursor:pointer; font-size:12px; background:#fff; user-select:none; }
  .radio-pill input { display:none; }
  .radio-pill.activo { background:var(--negro); color:#fff; border-color:var(--negro); }

  /* FOTO */
  .zona-foto { border:1.5px dashed var(--borde); border-radius:6px; padding:20px; text-align:center; cursor:pointer; background:#fff; position:relative; margin-bottom:14px; }
  .zona-foto input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .foto-icono { font-size:22px; margin-bottom:5px; }
  .foto-texto { font-size:11px; color:var(--gris); }
  .foto-preview { width:100%; max-height:150px; object-fit:cover; border-radius:4px; margin-top:8px; display:none; }

  .btn-enviar { width:100%; padding:13px; background:var(--negro); color:#fff; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; border:none; border-radius:4px; cursor:pointer; }
  .btn-enviar:disabled { background:var(--gris); cursor:not-allowed; }

  /* RESULTADOS */
  .resultado { display:none; border-radius:8px; padding:24px; text-align:center; margin-top:16px; }
  .resultado.exito { background:#f0faf4; border:1px solid #a8e6be; }
  .resultado.error { background:#fdf1f0; border:1px solid #f5b8b3; }
  .resultado-icono { font-size:28px; margin-bottom:8px; }
  .resultado-titulo { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; margin-bottom:6px; }
  .resultado-desc { font-size:12px; color:var(--gris); line-height:1.6; }
  .btn-nuevo { margin-top:12px; padding:8px 18px; background:var(--negro); color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:11px; letter-spacing:1px; text-transform:uppercase; }

  .overlay { display:none; position:fixed; inset:0; background:rgba(26,26,26,.85); z-index:100; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
  .overlay.visible { display:flex; }
  .spinner { width:28px; height:28px; border:3px solid rgba(255,255,255,.2); border-top-color:var(--dorado); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .overlay-texto { color:#fff; font-size:12px; letter-spacing:1px; }

  .sp { display:inline-block; width:16px; height:16px; border:2px solid #ddd; border-top-color:var(--negro); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
  .cargando { text-align:center; padding:32px; color:var(--gris); font-size:12px; }
  .error-page { text-align:center; padding:48px 20px; }
  .error-icono { font-size:40px; margin-bottom:12px; }
  .error-titulo { font-family:'Cormorant Garamond',serif; font-size:22px; margin-bottom:8px; }
  .error-desc { font-size:13px; color:var(--gris); }

  .sat-box { background:var(--crema); border-radius:4px; padding:10px 14px; display:flex; align-items:center; gap:10px; margin-top:8px; }
  .sat-box a { font-size:13px; color:var(--negro); text-decoration:none; font-weight:500; }
  .sat-box span { font-size:11px; color:var(--gris); }

  @media (max-width:400px) { .prios { grid-template-columns:1fr; } .info-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-marca">Grupo Tandem Gastronómico</div>
    <div class="header-sub">Sistema de mantenimiento</div>
  </div>
</div>

<div class="contenedor" id="contenedor">
  <div class="cargando"><span class="sp"></span> Cargando ficha del equipo...</div>
</div>

<div class="overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="overlay-texto">Registrando incidencia...</div>
</div>

<script>
  var URL_API  = "https://script.google.com/macros/s/AKfycbw8NKiWyeA-2RfRGWZBk1FJ8xvDPhPn61R17hqDRk9MqUv0m82Z1opKX95w4jEklXldIA/exec";
  var URL_FORM = "https://operacionestandem.github.io/mantenimiento";

  var activoActual = null;
  var fotoBase64   = "";
  var fotoNombre   = "";
  var frecuenciaVal = "";

  var PC = { P1:{bg:'#fdf1f0',c:'#C0392B'}, P2:{bg:'#fef5ec',c:'#E67E22'}, P3:{bg:'#fefbe8',c:'#D4AC0D'}, P4:{bg:'#f0faf4',c:'#27AE60'} };

  window.addEventListener('load', function() {
    var params = new URLSearchParams(window.location.search);
    var id     = params.get('id');
    if (!id) { mostrarError('No se ha especificado ningún equipo.'); return; }
    cargarActivo(id);
  });

  function cargarActivo(id) {
    fetch(URL_API + '?accion=obtenerActivo&id=' + encodeURIComponent(id), { redirect:'follow', mode:'cors', credentials:'omit' })
      .then(function(r){ return r.json(); })
      .then(function(res) {
        if (res.ok && res.activo) {
          activoActual = res.activo;
          renderPagina(res.activo, res.tickets || []);
        } else {
          mostrarError('Equipo no encontrado. Comprueba el código QR.');
        }
      }).catch(function(){ mostrarError('Error de conexión. Inténtalo de nuevo.'); });
  }

  function renderPagina(a, tickets) {
    var garantiaHtml = '';
    if (a.garantia) {
      garantiaHtml = a.garantiaOk
        ? '<div class="garantia-banner garantia-ok">✅ Garantía vigente hasta ' + a.garantia + '</div>'
        : '<div class="garantia-banner garantia-exp">⚠️ Garantía expirada el ' + a.garantia + '</div>';
    } else {
      garantiaHtml = '<div class="garantia-banner garantia-na">ℹ️ Sin datos de garantía</div>';
    }

    var satHtml = a.telSat
      ? '<div class="sat-box"><span>📞 SAT:</span><a href="tel:'+a.telSat+'">'+a.telSat+'</a><span>'+(a.proveedor||'')+'</span></div>'
      : '';

    var historialHtml = '';
    if (tickets.length) {
      historialHtml = tickets.slice(0,5).map(function(t) {
        var pc = PC[t.prioridad] || PC['P4'];
        return '<div class="historial-item">'
          +'<span class="h-prio" style="background:'+pc.bg+';color:'+pc.c+';">'+t.prioridad+'</span>'
          +'<div class="h-desc">'+esc(t.descripcion.substring(0,60))+(t.descripcion.length>60?'...':'')+'<div class="h-estado">'+t.estado+'</div></div>'
          +'<span class="h-fecha">'+t.timestamp.substring(0,10)+'</span>'
          +'</div>';
      }).join('');
    } else {
      historialHtml = '<div class="historial-vacio">Sin incidencias registradas</div>';
    }

    document.getElementById('contenedor').innerHTML =
      // FICHA
      '<div class="ficha">'
      +'<div class="ficha-header">'
      +'<div class="ficha-id">'+esc(a.id)+'</div>'
      +'<div class="ficha-nombre">'+esc(a.nombre)+'</div>'
      +'<div class="ficha-local">'+esc(a.local)+' · '+esc(a.zona)+'</div>'
      +'</div>'
      +'<div class="ficha-body">'
      +garantiaHtml
      +'<div class="info-grid">'
      +'<div class="info-item"><label>Marca</label><span>'+(a.marca||'—')+'</span></div>'
      +'<div class="info-item"><label>Modelo</label><span>'+(a.modelo||'—')+'</span></div>'
      +'<div class="info-item"><label>Nº Serie</label><span>'+(a.numSerie||'—')+'</span></div>'
      +'<div class="info-item"><label>Fecha compra</label><span>'+(a.fechaCompra||'—')+'</span></div>'
      +'</div>'
      +satHtml
      +'<div style="margin-top:16px;"><div class="seccion-titulo">Historial de incidencias ('+tickets.length+')</div>'
      +historialHtml+'</div>'
      +'</div></div>'

      // FORMULARIO DE TICKET
      +'<div class="form-card">'
      +'<div class="form-header">'
      +'<div class="form-titulo">🔧 Reportar incidencia</div>'
      +'<div class="form-sub">El equipo '+esc(a.nombre)+' quedará preseleccionado automáticamente</div>'
      +'</div>'
      +'<div class="form-body">'
      +'<div class="campo"><label>Nombre completo <span class="req">*</span></label><input type="text" id="nombre" required placeholder="Tu nombre"></div>'
      +'<div class="campo"><label>Email de contacto <span class="req">*</span></label><input type="email" id="email" required placeholder="tu@email.com"></div>'
      +'<div class="campo"><label>Descripción detallada <span class="req">*</span></label><textarea id="descripcion" required placeholder="Describe qué está ocurriendo con este equipo..."></textarea></div>'
      +'<div class="campo"><label>Estado del equipo <span class="req">*</span></label>'
      +'<select id="estadoEquipo" required><option value="">— Selecciona —</option>'
      +'<option>Operativo con limitaciones</option><option>Fuera de servicio</option><option>Operativo pero deteriorado</option>'
      +'</select></div>'
      +'<div class="campo"><label>Impacto en la operativa <span class="req">*</span></label>'
      +'<select id="impacto" required><option value="">— Selecciona —</option>'
      +'<option>Podemos funcionar con normalidad</option><option>Podemos funcionar con limitaciones</option><option>No podemos dar servicio</option>'
      +'</select></div>'
      +'<div class="campo"><label>Frecuencia</label>'
      +'<div class="radio-grupo" id="radioFrecuencia">'
      +'<label class="radio-pill" onclick="selPill(this)"><input type="radio" name="frecuencia" value="Constante"> Constante</label>'
      +'<label class="radio-pill" onclick="selPill(this)"><input type="radio" name="frecuencia" value="Intermitente"> Intermitente</label>'
      +'<label class="radio-pill" onclick="selPill(this)"><input type="radio" name="frecuencia" value="Puntual"> Puntual</label>'
      +'</div></div>'
      +'<div class="campo"><label>Acciones provisionales</label><textarea id="accionesProv" placeholder="¿Has tomado alguna medida?" style="min-height:55px;"></textarea></div>'
      +'<label style="font-size:11px;font-weight:500;display:block;margin-bottom:8px;">Nivel de prioridad <span style="color:var(--p1);">*</span></label>'
      +'<div class="prios">'
      +'<label class="prio-card" data-p="P1" onclick="selPrio(this)"><input type="radio" name="prioridad" value="P1"><div class="pc">P1</div><div class="pn">Crítico — Servicio parado</div><div class="pd">No podemos operar.</div></label>'
      +'<label class="prio-card" data-p="P2" onclick="selPrio(this)"><input type="radio" name="prioridad" value="P2"><div class="pc">P2</div><div class="pn">Urgente — Técnico externo</div><div class="pd">Requiere especialista.</div></label>'
      +'<label class="prio-card" data-p="P3" onclick="selPrio(this)"><input type="radio" name="prioridad" value="P3"><div class="pc">P3</div><div class="pn">Estético — Sin impacto</div><div class="pd">No afecta al servicio.</div></label>'
      +'<label class="prio-card" data-p="P4" onclick="selPrio(this)"><input type="radio" name="prioridad" value="P4"><div class="pc">P4</div><div class="pn">Pendiente — En lista</div><div class="pd">Sin urgencia.</div></label>'
      +'</div>'
      +'<div class="zona-foto" id="zonaFoto">'
      +'<input type="file" id="fotoInput" accept="image/*" onchange="previewFoto(event)">'
      +'<div class="foto-icono">📷</div>'
      +'<div class="foto-texto">Toca para añadir una foto del problema</div>'
      +'<img class="foto-preview" id="fotoPreview" src="" alt="Preview">'
      +'</div>'
      +'<button class="btn-enviar" id="btnEnviar" onclick="enviarTicket()">Enviar ticket de mantenimiento</button>'
      +'</div></div>'
      +'<div class="resultado exito" id="resultadoOK"><div class="resultado-icono">✅</div><div class="resultado-titulo">Ticket registrado</div><div class="resultado-desc">Recibirás confirmación por email en breve.<br>El equipo de mantenimiento ha sido notificado.</div><button class="btn-nuevo" onclick="location.reload()">Reportar otra incidencia</button></div>'
      +'<div class="resultado error" id="resultadoERR"><div class="resultado-icono">❌</div><div class="resultado-titulo">Error al enviar</div><div class="resultado-desc" id="resError"></div><button class="btn-nuevo" onclick="document.getElementById(\'resultadoERR\').style.display=\'none\'">Reintentar</button></div>';
  }

  function selPrio(card) {
    document.querySelectorAll('.prio-card').forEach(function(c){ c.classList.remove('sel'); });
    card.classList.add('sel');
    card.querySelector('input').checked = true;
  }

  function selPill(pill) {
    document.querySelectorAll('#radioFrecuencia .radio-pill').forEach(function(p){ p.classList.remove('activo'); });
    pill.classList.add('activo');
    frecuenciaVal = pill.querySelector('input').value;
  }

  function previewFoto(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (file.size > 3*1024*1024) { alert('La imagen supera los 3MB.'); return; }
    fotoNombre = file.name;
    var reader = new FileReader();
    reader.onload = function(ev) {
      fotoBase64 = ev.target.result;
      var p = document.getElementById('fotoPreview');
      p.src = fotoBase64; p.style.display='block';
      document.querySelector('.foto-icono').style.display='none';
      document.querySelector('.foto-texto').style.display='none';
    };
    reader.readAsDataURL(file);
  }

  function enviarTicket() {
    if (!activoActual) return;
    var nombre   = document.getElementById('nombre').value.trim();
    var email    = document.getElementById('email').value.trim();
    var desc     = document.getElementById('descripcion').value.trim();
    var estado   = document.getElementById('estadoEquipo').value;
    var impacto  = document.getElementById('impacto').value;
    var prioEl   = document.querySelector('.prio-card.sel input');

    if (!nombre || !email || !desc || !estado || !impacto) { alert('Por favor completa todos los campos obligatorios.'); return; }
    if (!prioEl) { alert('Por favor selecciona el nivel de prioridad.'); return; }

    var emailUsuario = email;
    document.getElementById('loadingOverlay').classList.add('visible');
    document.getElementById('btnEnviar').disabled = true;

    var params = new URLSearchParams({
      accion:       'crearTicket',
      nombre:       nombre,
      email:        email,
      local:        activoActual.local,
      zona:         activoActual.zona,
      descripcion:  '[' + activoActual.id + ' · ' + activoActual.nombre + '] ' + desc,
      estadoEquipo: estado,
      impacto:      impacto,
      frecuencia:   frecuenciaVal,
      accionesProv: (document.getElementById('accionesProv') ? document.getElementById('accionesProv').value.trim() : ''),
      prioridad:    prioEl.value,
      activoId:     activoActual.id,
    });

    fetch(URL_API + '?' + params.toString(), { mode:'no-cors' })
      .then(function() {
        document.getElementById('loadingOverlay').classList.remove('visible');
        document.getElementById('form-card') && (document.querySelector('.form-card').style.display='none');
        document.getElementById('resultadoOK').style.display = 'block';
        document.getElementById('btnEnviar').disabled = false;
      })
      .catch(function() {
        document.getElementById('loadingOverlay').classList.remove('visible');
        document.getElementById('btnEnviar').disabled = false;
        document.getElementById('resError').textContent = 'Error de conexión. Inténtalo de nuevo.';
        document.getElementById('resultadoERR').style.display = 'block';
      });
  }

  function mostrarError(msg) {
    document.getElementById('contenedor').innerHTML =
      '<div class="error-page"><div class="error-icono">⚠️</div><div class="error-titulo">Equipo no encontrado</div><div class="error-desc">'+msg+'</div></div>';
  }

  function esc(s){ return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '—'; }
</script>
</body>
</html>
